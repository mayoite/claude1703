name: Supabase Backup

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_BACKUP_TABLES: ${{ secrets.SUPABASE_BACKUP_TABLES }}
      SUPABASE_BACKUP_RETENTION_DAYS: ${{ secrets.SUPABASE_BACKUP_RETENTION_DAYS }}
      NHOST_GRAPHQL_ENDPOINT: ${{ secrets.NHOST_GRAPHQL_ENDPOINT }}
      NHOST_SERVICE_ROLE_KEY: ${{ secrets.NHOST_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Supabase backup
        run: npm run supabase:backup

      - name: Archive backup folder
        run: tar -czf supabase-backup.tgz backups/supabase

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: supabase-backup.tgz
          retention-days: 30
