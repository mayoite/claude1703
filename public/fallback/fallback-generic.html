<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>One and Only Furniture | Fallback</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #ffffff;
        color: #1a1f71;
      }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        max-width: 700px;
        border: 1px solid #e6e8f3;
        border-radius: 18px;
        padding: 28px;
      }
      h1 {
        margin: 0 0 10px;
      }
      p {
        color: #75787b;
        line-height: 1.6;
      }
      .actions {
        display: flex;
        gap: 12px;
        margin-top: 16px;
      }
      a {
        padding: 10px 14px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 700;
      }
      .primary {
        background: #fdbb0a;
        color: #1a1f71;
      }
      .secondary {
        border: 1px solid #d8dbe7;
        color: #1a1f71;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Fallback Mode Active</h1>
        <p>
          A temporary service issue was detected. Use fallback mode for continuity,
          then retry the original page.
        </p>
        <div class="actions">
          <a class="primary" href="/">Home</a>
          <a class="secondary" href="/products">Products</a>
        </div>
      </section>
    </main>
  </body>
</html>
